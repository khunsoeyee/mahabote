<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>မဟာဘုတ်တွက်စက်</title>
    <style>
        body { font-family: 'Pyidaungsu', sans-serif; background-color: #e5ffd3d9; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; position: relative; }
        
        .legend-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; background: #ffbcf9d9; border: 1px solid #fbc02d; border-radius: 8px; overflow: hidden; }
        .legend-table td { padding: 8px; border: 1px solid #fbc02d; font-size: 14px; font-weight: bold; }
        .pao-text { color: #1807fcd9; }
        .num-text { color: #fa2575; }

        input, select { width: 90%; padding: 12px; margin-bottom: 15px; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; text-align: center; outline: none; transition: 0.3s; }
        input:focus, select:focus { border-color: #28a745; }
        
        /* Shake Animation for Error */
        .error-shake { animation: shake 0.4s ease-in-out; border-color: #ff4757 !important; background-color: #fff2f2; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            50% { transform: translateX(8px); }
            75% { transform: translateX(-8px); }
        }

        button { width: 95%; padding: 12px; background-color: #28a745; color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 18px; font-weight: bold; transition: 0.3s; }
        button:hover { background-color: #218838; }
        
        .result-title { margin-top: 20px; font-size: 18px; font-weight: bold; color: #333; }
        .final-result { margin-top: 15px; padding: 15px; background: #fff3cd; border-radius: 10px; border: 1px solid #ffeeba; color: #856404; font-weight: bold; }

        .grid-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
        .grid-item { border: 2px solid #444; padding: 12px; border-radius: 10px; background: #fff; min-height: 85px; display: flex; flex-direction: column; justify-content: center; transition: 0.2s; }
        .house-name { font-size: 13px; color: #757575; font-weight: bold; margin-bottom: 5px; }
        .day-label { font-size: 16px; color: #d32f2f; font-weight: bold; }
        .empty { border: none; visibility: hidden; }
        .highlight { background-color: #9bff9e; border-color: #fbc02d; }

        /* --- Custom Modals (About & Error) --- */
        #customModal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            max-width: 300px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .animate-text { opacity: 0; transform: translateY(20px); display: block; margin: 8px 0; font-weight: bold; font-size: 18px; }
        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
        
        .close-btn { margin-top: 20px; padding: 10px 25px; background: #28a745; color: white; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; }
        .error-msg { color: #ff4757; font-size: 18px; font-weight: bold; margin-bottom: 10px; }

        .footer {
            margin-top: 30px; padding-top: 15px; border-top: 1px solid #ddd;
            display: flex; justify-content: space-around; gap: 10px; width: 100%;
        }
        .footer-btn {
            flex: 1; padding: 10px; font-size: 14px; border-radius: 8px; border: 1px solid #28a745;
            background: white; color: #28a745; cursor: pointer; text-decoration: none; font-weight: bold; transition: 0.3s;
            display: flex; align-items: center; justify-content: center;
        }
        .footer-btn:hover { background: #28a745; color: white; }
        .blog-btn { border-color: #007bff; color: #007bff; }
        .blog-btn:hover { background: #007bff; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color: #2c3e50;">တွက်ထွားမဟာႏဘုတ်</h2>

    <table class="legend-table">
        <tr class="pao-text">
            <td>အ</td><td>လမ်း</td><td>ထွိုင်ႏ</td><td>ညာꩻ</td><td>သꩻ</td><td>ကဲဉ်း</td><td>ပါꩻ</td>
        </tr>
        <tr class="num-text">
            <td>1</td><td>4</td><td>0/7</td><td>3</td><td>6</td><td>2</td><td>5</td>
        </tr>
    </table>

    <input type="number" id="yearInput" placeholder="လွူးဖွါꩻနေင်ႏ (ဥပမာႏ-၁၃၅၀)">
    
    <select id="daySelect">
        <option value="">-- လွိုက်သွော့မွူးနီꩻ --</option>
        <option value="1">တနင်ꩻနွေႏ</option>
        <option value="2">တနင်္လာႏ</option>
        <option value="3">အင်္ဂါႏ</option>
        <option value="4">ဗုဒ္ဓဟူꩻ</option>
        <option value="5">ကျာႏသပတေꩻ</option>
        <option value="6">သောကျာႏ</option>
        <option value="0">စနေႏ</option>
    </select>

    <button onclick="calculate()">တွက်ထွား</button>

    <div id="resultArea" style="display:none;">
        <p id="infoText" class="result-title"></p>
        <div class="grid-container">
            <div class="empty"></div>
            <div id="box7" class="grid-item"><span class="house-name">အဓိပတိ</span><span id="h7" class="day-label"></span></div>
            <div class="empty"></div>
            <div id="box3" class="grid-item"><span class="house-name">အထွန်း</span><span id="h3" class="day-label"></span></div>
            <div id="box4" class="grid-item"><span class="house-name">သိုက်</span><span id="h4" class="day-label"></span></div>
            <div id="box5" class="grid-item"><span class="house-name">ရာဇ</span><span id="h5" class="day-label"></span></div>
            <div id="box2" class="grid-item"><span class="house-name">မရဏ</span><span id="h2" class="day-label"></span></div>
            <div id="box1" class="grid-item"><span class="house-name">ဘင်္ဂ</span><span id="h1" class="day-label"></span></div>
            <div id="box6" class="grid-item"><span class="house-name">ပုတိ</span><span id="h6" class="day-label"></span></div>
        </div>
        <div id="analysisResult" class="final-result"></div>
    </div>

    <div class="footer">
        <button class="footer-btn" onclick="showAbout()">အကျောင်ꩻခရာႏ</button>
        <a href="https://khunsoeyee.blogspot.com" target="_blank" class="footer-btn blog-btn">BLOG</a>
    </div>
</div>

<div id="customModal">
    <div class="modal-content">
        <div id="modalBody"></div>
        <button class="close-btn" onclick="closeModal()">လက်ခံဒါး</button>
    </div>
</div>

<script>
    const dayNames = { 1: "တနင်ꩻနွေႏ", 2: "တနင်္လာႏ", 3: "အင်္ဂါႏ", 4: "ဗုဒ္ဓဟူꩻ", 5: "ကျာႏသပတေꩻ", 6: "သောကျာႏ", 7: "စနေႏ", 0: "စနေႏ" };
    const houseNames = { 1: "ဘင်္ဂ", 2: "မရဏ", 3: "အထွန်း", 4: "သိုက်", 5: "ရာဇ", 6: "ပုတိ", 7: "အဓိပတိ" };
    const sequence = [1, 4, 0, 3, 6, 2, 5];

    function showModal(content, isError = false) {
        const modal = document.getElementById('customModal');
        const body = document.getElementById('modalBody');
        body.innerHTML = content;
        modal.style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('customModal').style.display = 'none';
    }

    function showAbout() {
        const aboutData = [
            { text: "✨ မင်္ဂလာဒျာႏဩ ✨", color: "#e91e63" },
            { text: "-----------------------", color: "#9c27b0" },
            { text: "ယိုနဝ်ꩻတွက်ထွားမဟာႏဘုတ်ကွက်ꩻ အနယ်ꩻသွူ။", color: "#2196f3" },
            { text: "💡 ဖန်ဆင်ꩻသား -", color: "#ff9800" },
            { text: "ခွန်စိုးရီ (ပုံꩻချို့ꩻထီ)", color: "#4caf50" },
            { text: "-----------------------", color: "#9c27b0" }
        ];
        
        let html = "";
        aboutData.forEach((item, index) => {
            html += `<span class="animate-text" style="color:${item.color}; animation: fadeInUp 0.6s ease forwards ${index * 0.3}s">${item.text}</span>`;
        });
        showModal(html);
    }

    function calculate() {
        let yearInput = document.getElementById('yearInput');
        let daySelect = document.getElementById('daySelect');
        let year = yearInput.value;
        let selectedDay = daySelect.value;
        
        // Error Handling with Shake Effect
        if (!year) {
            yearInput.classList.add('error-shake');
            setTimeout(() => yearInput.classList.remove('error-shake'), 400);
            showModal("<div class='error-msg'>⚠️ သတိပြုရန်</div>တဲမ်းသော့ꩻသွော့လွူးဖွါꩻနေင်ႏ");
            return;
        }
        if (selectedDay === "") {
            daySelect.classList.add('error-shake');
            setTimeout(() => daySelect.classList.remove('error-shake'), 400);
            showModal("<div class='error-msg'>⚠️ သတိပြုရန်</div>လွိုက်သွော့မွူးနီꩻ");
            return;
        }

        let rem = year % 7;
        let calcRem = (rem === 0) ? 7 : rem;
        document.getElementById('infoText').innerText = "အကျွင်ꩻလꩻ " + calcRem + " သွူဩ။";

        let startIndex = sequence.indexOf(rem);
        let housesMap = {};

        for (let i = 1; i <= 7; i++) {
            let dayVal = sequence[(startIndex + (i - 1)) % 7];
            document.getElementById('h' + i).innerText = dayNames[dayVal] + " (" + dayVal + ")";
            housesMap[dayVal] = i;
            document.getElementById('box' + i).classList.remove('highlight');
        }

        let birthDayInt = parseInt(selectedDay);
        let houseIndex = housesMap[birthDayInt];
        let houseName = houseNames[houseIndex];
        
        document.getElementById('analysisResult').innerHTML = 
            dayNames[birthDayInt] + "သားနဝ်ꩻဖွါꩻ<br><span style='font-size:24px; color:#d32f2f;'>" + houseName + "</span> သွူဩ။";

        document.getElementById('box' + houseIndex).classList.add('highlight');
        document.getElementById('resultArea').style.display = 'block';
    }
</script>

</body>
</html>
